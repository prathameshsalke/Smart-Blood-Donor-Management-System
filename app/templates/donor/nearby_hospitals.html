{% extends "base.html" %}

{% block title %}Nearby Hospitals - {{ super() }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
<style>
    #hospitalMap {
        height: 400px;
        border-radius: 10px;
        margin-bottom: 20px;
    }
    .hospital-card {
        transition: all 0.3s;
        border-left: 4px solid #17a2b8;
    }
    .hospital-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 20px rgba(23,162,184,0.2);
    }
    .blood-bank-badge {
        background: #28a745;
        color: white;
        padding: 0.3rem 0.8rem;
        border-radius: 20px;
        font-size: 0.8rem;
    }
    .hospital-icon {
        width: 50px;
        height: 50px;
        background: #17a2b8;
        color: white;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-12">
            <h2 class="mb-4">
                <i class="fas fa-hospital text-info me-2"></i>Nearby Hospitals
            </h2>
        </div>
    </div>

    <!-- Location Status -->
    <div class="alert alert-info mb-4" id="locationStatus">
        <i class="fas fa-spinner fa-spin me-2"></i>
        Detecting your location...
    </div>

    <!-- Map -->
    <div id="hospitalMap"></div>

    <!-- Filters -->
    <div class="row mt-4 mb-3">
        <div class="col-md-4">
            <label class="form-label">Search Radius (km)</label>
            <input type="range" class="form-range" id="radiusFilter" min="1" max="50" value="20">
            <div class="d-flex justify-content-between">
                <span>1 km</span>
                <span id="radiusValue">20 km</span>
                <span>50 km</span>
            </div>
        </div>
        <div class="col-md-4">
            <label class="form-label">Filter</label>
            <select class="form-select" id="hospitalFilter">
                <option value="all">All Hospitals</option>
                <option value="blood_bank">With Blood Bank</option>
                <option value="verified">Verified Only</option>
            </select>
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <button class="btn btn-info w-100" onclick="applyFilters()">
                <i class="fas fa-search me-2"></i>Search Hospitals
            </button>
        </div>
    </div>

    <!-- Results Summary -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>
            <span id="hospitalCount">0</span> Hospitals Found
        </h4>
    </div>

    <!-- Hospitals Grid -->
    <div class="row" id="hospitalsContainer">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-info" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Searching for nearby hospitals...</p>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
<script>
let map;
let userMarker;
let hospitalMarkers = [];
let circle;
let userLocation = null;
let currentHospitals = [];

// Initialize map
function initMap() {
    map = L.map('hospitalMap').setView([20.5937, 78.9629], 5);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);
    
    detectLocation();
}

// Detect user location
function detectLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            userLocation = {
                lat: position.coords.latitude,
                lon: position.coords.longitude
            };
            
            document.getElementById('locationStatus').innerHTML = `
                <i class="fas fa-check-circle text-success me-2"></i>
                Location detected: ${userLocation.lat.toFixed(4)}, ${userLocation.lon.toFixed(4)}
            `;
            
            map.setView([userLocation.lat, userLocation.lon], 12);
            
            userMarker = L.marker([userLocation.lat, userLocation.lon])
                .addTo(map)
                .bindPopup('Your Location')
                .openPopup();
            
            searchHospitals();
            
        }, function(error) {
            document.getElementById('locationStatus').innerHTML = `
                <i class="fas fa-exclamation-triangle text-warning me-2"></i>
                Could not detect location: ${error.message}
            `;
        });
    }
}

// Search hospitals
async function searchHospitals() {
    if (!userLocation) return;
    
    const radius = document.getElementById('radiusFilter').value;
    const filter = document.getElementById('hospitalFilter').value;
    
    try {
        const response = await fetch(
            `/api/hospitals/nearby?lat=${userLocation.lat}&lon=${userLocation.lon}&radius=${radius}`
        );
        const data = await response.json();
        
        if (data.status === 'success') {
            let hospitals = data.hospitals;
            
            // Apply filters
            if (filter === 'blood_bank') {
                hospitals = hospitals.filter(h => h.has_blood_bank);
            } else if (filter === 'verified') {
                hospitals = hospitals.filter(h => h.is_verified);
            }
            
            currentHospitals = hospitals;
            displayHospitals(hospitals);
        }
    } catch (error) {
        console.error('Search error:', error);
    }
}

// Display hospitals
function displayHospitals(hospitals) {
    // Clear existing markers
    hospitalMarkers.forEach(marker => map.removeLayer(marker));
    hospitalMarkers = [];
    
    document.getElementById('hospitalCount').textContent = hospitals.length;
    
    // Draw radius
    drawRadius();
    
    if (hospitals.length === 0) {
        document.getElementById('hospitalsContainer').innerHTML = `
            <div class="col-12 text-center py-5">
                <i class="fas fa-hospital fa-4x text-muted mb-3"></i>
                <h5>No Hospitals Found</h5>
                <p class="text-muted">Try increasing the search radius</p>
            </div>
        `;
        return;
    }
    
    // Add markers
    hospitals.forEach(hospital => {
        const marker = L.marker([hospital.latitude, hospital.longitude])
            .addTo(map)
            .bindPopup(`
                <b>${hospital.name}</b><br>
                ${hospital.address}<br>
                Phone: ${hospital.phone}<br>
                Distance: ${hospital.distance_km} km
            `);
        hospitalMarkers.push(marker);
    });
    
    // Display hospital cards
    let html = '';
    hospitals.forEach(hospital => {
        html += `
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card hospital-card h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-start mb-3">
                            <div class="hospital-icon me-3">
                                <i class="fas fa-hospital"></i>
                            </div>
                            <div>
                                <h5 class="card-title mb-1">${hospital.name}</h5>
                                <p class="text-muted small mb-0">${hospital.city}</p>
                            </div>
                        </div>
                        
                        <p class="mb-2">
                            <i class="fas fa-map-marker-alt text-info me-2"></i>
                            ${hospital.address}
                        </p>
                        
                        <p class="mb-2">
                            <i class="fas fa-phone text-info me-2"></i>
                            ${hospital.phone}
                        </p>
                        
                        <p class="mb-2">
                            <i class="fas fa-map-pin text-info me-2"></i>
                            ${hospital.distance_km} km away
                        </p>
                        
                        ${hospital.has_blood_bank ? 
                            '<span class="blood-bank-badge"><i class="fas fa-tint me-1"></i>Blood Bank Available</span>' : 
                            ''}
                        
                        <div class="mt-3">
                            <button class="btn btn-outline-info btn-sm w-100" onclick="getDirections(${hospital.latitude}, ${hospital.longitude})">
                                <i class="fas fa-directions me-1"></i>Get Directions
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    });
    
    document.getElementById('hospitalsContainer').innerHTML = html;
}

// Draw radius
function drawRadius() {
    if (!userLocation) return;
    
    if (circle) {
        map.removeLayer(circle);
    }
    
    const radius = document.getElementById('radiusFilter').value;
    
    circle = L.circle([userLocation.lat, userLocation.lon], {
        color: '#17a2b8',
        fillColor: '#17a2b8',
        fillOpacity: 0.1,
        radius: radius * 1000
    }).addTo(map);
}

// Get directions
function getDirections(lat, lon) {
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

// Apply filters
function applyFilters() {
    searchHospitals();
}

// Update radius display
document.getElementById('radiusFilter').addEventListener('input', function(e) {
    document.getElementById('radiusValue').textContent = e.target.value + ' km';
});

// Initialize on load
document.addEventListener('DOMContentLoaded', initMap);
</script>
{% endblock %}
